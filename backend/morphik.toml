#### Component configurations ####

[completion]
model = "gemini_flash"          # Primary LLM: Gemini 2.5 Flash
default_max_tokens = "2000"
default_temperature = 0.3

[database]
provider = "postgres"
pool_size = 10
max_overflow = 15
pool_recycle = 3600
pool_timeout = 10
pool_pre_ping = true
max_retries = 3
retry_delay = 1.0

[embedding]
model = "google_embedding"      # Google text-embedding-004 (768 dims, same API key as Gemini)
dimensions = 768
similarity_metric = "cosine"

[parser]
chunk_size = 1000
chunk_overlap = 150
use_contextual_chunking = false
contextual_chunking_model = "gemini_flash"

[parser.xml]
max_tokens = 350
preferred_unit_tags = ["SECTION", "Section", "Article", "clause"]
ignore_tags = ["TOC", "INDEX"]

[document_analysis]
model = "gemini_flash"          # Gemini for PDF/image understanding during ingestion

[parser.vision]
model = "gemini_flash"          # Gemini vision for visual document parsing
frame_sample_rate = -1          # -1 disables video frame captioning

[reranker]
use_reranker = false            # Enable for better search quality (requires more RAM)
provider = "flag"
model_name = "BAAI/bge-reranker-large"
query_max_length = 256
passage_max_length = 512
use_fp16 = true
device = "cpu"

[storage]
provider = "local"
storage_path = "./storage"
cache_enabled = false
cache_max_size_gb = 10
s3_upload_concurrency = 16

[vector_store]
provider = "pgvector"

[multivector_store]
provider = "postgres"

[redis]
url = "redis://redis:6379/0"
host = "redis"
port = 6379

[worker]
arq_max_jobs = 2                # Allow 2 concurrent ingestion jobs
colpali_store_batch_size = 16

[pdf]
colpali_pdf_dpi = 150

[morphik]
enable_colpali = false          # ColPali requires GPU — disabled for now
mode = "self_hosted"
secret_manager = "env"
api_domain = "api.morphik.ai"
morphik_embedding_api_domain = ["http://localhost:6000"]
colpali_mode = "off"
parser_mode = "local"

[pdf_viewer]
frontend_url = "http://localhost:3000/api/pdf"

[telemetry]
service_name = "knowledge-hub"
project_name = ""
upload_interval_hours = 4.0
max_local_bytes = 1073741824
