[api]
host = "0.0.0.0"
port = 8000
reload = true

[service]
environment = "development"
version = "unknown"
enable_profiling = false

[auth]
jwt_algorithm = "HS256"
bypass_auth_mode = true  # Temporarily enabled — disable when adding real auth
dev_user_id = "dev_user"

#### Registered models
[registered_models]
# --- Google Gemini models (primary) ---
gemini_flash = { model_name = "gemini/gemini-2.5-flash-preview-05-20" }
gemini_pro   = { model_name = "gemini/gemini-2.5-pro-preview-06-05" }

# Google embedding model (uses same GEMINI_API_KEY)
google_embedding = { model_name = "gemini/text-embedding-004" }

# --- OpenAI models (optional fallback) ---
openai_gpt4-1      = { model_name = "gpt-4.1" }
openai_gpt4-1-mini = { model_name = "gpt-4.1-mini" }
openai_embedding   = { model_name = "text-embedding-3-small" }

# --- Anthropic models (optional fallback) ---
claude_sonnet = { model_name = "claude-3-7-sonnet-latest" }

# --- Local Ollama models (optional, for offline use) ---
